<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded shadow w-80 text-center">
<img src="assets/github-logo.png" class="mx-auto " alt="">
<h1 class="text-2xl font-bold mb-2">GitHub Issues Tracker</h1>
<p class="text-gray-500 mb-6">Sign in to continue</p>

<input id="username"
class="border w-full p-2 mb-3 rounded"
placeholder="Username">

<input id="password"
type="password"
class="border w-full p-2 mb-3 rounded"
placeholder="Password">

<button onclick="login()"
class="bg-black text-white w-full p-2 rounded">
Sign In
</button>

<p class="text-xs text-gray-400 mt-4">
Demo: admin / admin123
</p>

</div>

<script src="/login.js"></script>

</body>
</html>
