<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-8 rounded shadow w-80">

<img src="assets/github-logo.png" class="w-16 mx-auto mb-4">

<h1 class="text-2xl font-bold text-center">Issues Tracker</h1>
<p class="text-center text-gray-500 mb-6">Login to continue</p>

<input id="username"
class="border w-full p-2 mb-3 rounded"
placeholder="Username">

<input id="password"
type="password"
class="border w-full p-2 mb-3 rounded"
placeholder="Password">

<button onclick="loginUser()"
class="bg-blue-500 text-white w-full p-2 rounded">
Sign In
</button>

<p class="text-sm text-center text-gray-500 mt-4">
Demo: admin / admin123
</p>

</div>

<script src="/login.js"></script>

</body>
</html>
