<!DOCTYPE html>
<html>
<head>
<title>Issues</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">



<div class="bg-black text-white flex justify-between p-4">

<h1 class="font-bold">GitHub Issues</h1>

<div>
<input id="searchText"
class="text-black p-1 rounded"
placeholder="Search issue">

<button onclick="searchIssue()"
class="bg-white text-black px-3 py-1 rounded">
Search
</button>
</div>

</div>




<div class="p-6">

<div class="mb-6">

<button id="allBtn"
onclick="loadIssues('all')"
class="px-4 py-2 bg-black text-white rounded mr-2">
All
</button>

<button id="openBtn"
onclick="loadIssues('open')"
class="px-4 py-2 bg-gray-300 rounded mr-2">
Open
</button>

<button id="closedBtn"
onclick="loadIssues('closed')"
class="px-4 py-2 bg-gray-300 rounded">
Closed
</button>

<span id="count" class="ml-4 font-bold"></span>

</div>




<div id="issue-container"
class="grid grid-cols-4 gap-4">
</div>

</div>




<div id="modal"
class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">

<div class="bg-white p-6 rounded w-96">

<h2 id="modal-title" class="text-xl font-bold mb-2"></h2>

<p id="modal-desc" class="mb-2"></p>

<p id="modal-author" class="text-gray-600 mb-4"></p>

<button onclick="closeModal()"
class="bg-black text-white px-4 py-2 rounded">
Close
</button>

</div>

</div>


<script src="/script.js"></script>

</body>
</html>
