<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Issues</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->

<div class="bg-white shadow p-4 flex justify-between">

<h1 class="text-xl font-bold">GitHub Issues</h1>

<div>

<input id="searchInput"
class="border p-2"
placeholder="Search issue">

<button onclick="searchIssue()"
class="bg-blue-500 text-white px-4 py-2">
Search
</button>

</div>

</div>

<!-- Tabs -->

<div class="p-6">

<div class="mb-6">

<button onclick="loadIssues()" class="bg-gray-200 px-4 py-2 mr-2">All</button>

<button onclick="loadOpen()" class="bg-gray-200 px-4 py-2 mr-2">Open</button>

<button onclick="loadClosed()" class="bg-gray-200 px-4 py-2">Closed</button>

</div>

<!-- Issues Grid -->

<div id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
</div>

</div>

<!-- Modal -->

<div id="modal"
class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center">

<div class="bg-white p-6 w-96 rounded">

<h2 id="modal-title" class="text-xl font-bold mb-2"></h2>

<p id="modal-desc" class="text-gray-600 mb-4"></p>

<p id="modal-status"></p>
<p id="modal-author"></p>
<p id="modal-priority"></p>
<p id="modal-label"></p>
<p id="modal-date"></p>

<div class="flex justify-end mt-4">

<button onclick="closeModal()"
class="bg-red-500 text-white px-4 py-2 rounded">
Close
</button>

</div>

</div>

</div>

<script src="/script.js"></script>

</body>
</html>
